---
name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - MAINTAINERS.md
      - LICENSE
      - NOTICE
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    uses: xmidt-org/shared-go/.github/workflows/ci.yml@227a30b4f5e491a935b7a02dfc104bc9e95d5739 # v4.11.5
    with:
      copyright-skip:           true
      release-type:             program
      license:                  MIT
      release-with-unique-user: false
      release-main-package:     cmd/process-exporter/main.go
    secrets: inherit
